    <title>HLS Video Player</title>

    <!-- HLS.js Library -->

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .player-container {
            width: 100%;
            max-width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        video {
            width: 100%;
            display: block;
            background: #000;
        }
        .player-controls {
            background: #1a1a1a;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .cast-button {
            background: #00cc33;

        }

        }

            color: #fff;

        }

    <div class="player-container">
        
        <video id="hlsPlayer_1774537974496" controls="" playsinline=""></video>
        <div class="player-controls">
            <button class="cast-button" id="castButton" onclick="castVideo()">
                <svg viewBox="0 0 24 24"><path d="M1,18 L1,21 L4,21 C4,19.34 2.66,18 1,18 M1,14 L1,16 C3.76,16 6,18.24 6,21 L8,21 C8,17.13 4.87,14 1,14 M1,10 L1,12 C5.97,12 10,16.03 10,21 L12,21 C12,14.92 7.07,10 1,10 M21,3 L3,3 C1.9,3 1,3.9 1,5 L1,8 L3,8 L3,5 L21,5 L21,19 L14,19 L14,21 L21,21 C22.1,21 23,20.1 23,19 L23,5 C23,3.9 22.1,3 21,3 Z"></path></svg>
                Cast to TV
            </button>
            <span id="castStatus"></span>
        </div>
    </div>

    <script>
        const video = document.getElementById('hlsPlayer_1774537974496');
        const streamUrl = 'https://live-hls-apps-aja-fa.getaj.net/AJA/index.m3u8';
        
        // Initialize HLS player
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Native HLS support (Safari/iOS)
            video.src = streamUrl;
        } else if (Hls.isSupported()) {
            // Use HLS.js for other browsers
            const hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true
            });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log('HLS stream loaded successfully');
                
            });
            
            hls.on(Hls.Events.ERROR, function(event, data) {
                if (data.fatal) {
                    console.error('HLS Error:', data);
                    if (typeof Swal !== 'undefined') {
                        Swal.fire({
                            icon: 'error',
                            title: 'Stream Error',
                            text: 'Error loading video stream. Please check the stream URL.',
                            confirmButtonColor: '#dc3545'
                        });
                    } else {
                        alert('Error loading video stream. Please check the stream URL.');
                    }
                }
            });
        } else {
            if (typeof Swal !== 'undefined') {
                Swal.fire({
                    icon: 'error',
                    title: 'Browser Not Supported',
                    text: 'HLS is not supported in this browser. Please use a modern browser.',
                    confirmButtonColor: '#dc3545'
                });
            } else {
                alert('HLS is not supported in this browser.');
            }
        }
        
        
        // Chromecast functionality
        let castSession = null;
        
        function initChromecast() {
            if (typeof cast !== 'undefined') {
                cast.framework.CastContext.getInstance().setOptions({
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
                });
                
                const castContext = cast.framework.CastContext.getInstance();
                castContext.addEventListener(
                    cast.framework.CastContextEventType.CAST_STATE_CHANGED,
                    onCastStateChanged
                );
            }
        }
        
        function castVideo() {
            const castContext = cast.framework.CastContext.getInstance();
            const castSession = castContext.getCurrentSession();
            
            if (castSession) {
                const mediaInfo = new chrome.cast.media.MediaInfo(streamUrl, 'application/x-mpegurl');
                mediaInfo.metadata = new chrome.cast.media.GenericMediaMetadata();
                mediaInfo.metadata.title = 'Live Stream';
                
                const request = new chrome.cast.media.LoadRequest(mediaInfo);
                castSession.loadMedia(request).then(
                    () => {
                        document.getElementById('castStatus').textContent = 'Casting...';
                        console.log('Casting started');
                    },
                    (error) => {
                        console.error('Error casting:', error);
                        document.getElementById('castStatus').textContent = 'Cast failed';
                    }
                );
            } else {
                castContext.requestSession().then(
                    () => { castVideo(); },
                    (error) => {
                        console.error('Error starting cast session:', error);
                        if (typeof Swal !== 'undefined') {
                            Swal.fire({
                                icon: 'error',
                                title: 'Chromecast Connection Failed',
                                text: 'Unable to connect to Chromecast device. Make sure your device is on the same network.',
                                confirmButtonColor: '#dc3545'
                            });
                        } else {
                            alert('Unable to connect to Chromecast device');
                        }
                    }
                );
            }
        }
        
        function onCastStateChanged(event) {
            const status = document.getElementById('castStatus');
            switch(event.castState) {
                case cast.framework.CastState.CONNECTED:
                    status.textContent = 'Connected to Chromecast';
                    break;
                case cast.framework.CastState.NOT_CONNECTED:
                    status.textContent = '';
                    break;
            }
        }
        
        // Initialize Chromecast when SDK is loaded
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                initChromecast();
            }
        };
    </script>
